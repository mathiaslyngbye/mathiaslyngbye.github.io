<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>

  <style>
    body {
      margin: 0;
      padding: 2rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas,
                   "Liberation Mono", monospace;
      font-size: 16px;
      line-height: 1.4;
      background: #fff;
      color: #000;
    }

    main {
      width: min(80ch, 100%);
      margin: 0 auto;
    }

    h1, h2 {
      font-size: inherit;
      font-weight: normal;
      margin: 1.4em 0;
      white-space: pre;
    }

    p, ul {
      margin: 1em 0;
    }

    ul {
      padding-left: 2ch;
    }

    li::marker {
      content: "* ";
    }
  </style>
</head>

<body>
  <main>
    {{ content }}
  </main>

  <script>
    for (const h of document.querySelectorAll("h1, h2")) {
      const text = h.textContent.trim();
      const underline = h.tagName === "H1" ? "=" : "-";
      h.textContent = text + "\n" + underline.repeat(text.length);
    }
  </script>
</body>
</html>
