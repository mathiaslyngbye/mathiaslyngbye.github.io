<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>

  <style>
    body {
      margin: 0;
      padding: 2rem;
      font: 16px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      background: #fff;
      color: #000;
    }

    main {
      width: min(80ch, 100%);
      margin: 0 auto;
    }

    h1,
    h2,
    p,
    ul {
      margin-top: 0;
      margin-bottom: 1lh;
    }

    h1,
    h2 {
      font-size: inherit;
      font-weight: normal;
      white-space: pre;
    }

    p + ul {
      margin-top: 1lh;
    }
    
    ul {
      list-style: none;
      padding-left: 0;
    }
    
    li {
      margin: 0;
      padding-left: 2ch;
    }
    
    li::before {
      content: "* ";
    }
  </style>
</head>

<body>
  <main>
    {{ content }}
  </main>

  <script>
    for (const h of document.querySelectorAll("h1, h2")) {
      const text = h.textContent.trim();
      const underline = h.tagName === "H1" ? "=" : "-";
      h.textContent = `${text}\n${underline.repeat(text.length)}`;
    }
  </script>
</body>
</html>
