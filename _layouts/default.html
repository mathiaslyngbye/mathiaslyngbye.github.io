<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title }}</title>

  <style>
    html {
      background: #ffffff;
      color: #000000;
    }

    body {
      margin: 0;
      padding: 2rem;

      font-family:
        ui-monospace,
        SFMono-Regular,
        Menlo,
        Consolas,
        "Liberation Mono",
        monospace;

      font-size: 16px;
      line-height: 1.4;
    }

    main {
      width: min(80ch, 100%);
      margin: 0 auto;
    }

    h1,
    h2 {
      font-size: inherit;
      font-weight: normal;
      margin: 0;
    }

    h1::after {
      content: "";
      display: block;
      border-bottom: 1ch solid transparent;
    }

    h2::after {
      content: "";
      display: block;
      border-bottom: 1ch solid transparent;
    }

    h1 {
      text-decoration: underline;
      text-decoration-style: solid;
      text-decoration-thickness: 2px;
      text-underline-offset: 0.35em;
    }

    h2 {
      text-decoration: underline;
      text-decoration-style: dashed;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.3em;
    }

    p,
    ul {
      margin-top: 1em;
      margin-bottom: 1em;
    }

    ul {
      padding-left: 2ch;
    }

    li::marker {
      content: "* ";
    }
  </style>
</head>

<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
